name: "Bug Report"
description: "Something is not working correctly"
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "What happened?"
      description: "A clear description of the bug"
    validations:
      required: true

  - type: textarea
    id: probe_output
    attributes:
      label: "openuma probe output"
      description: "Always include this — it tells us your hardware"
      placeholder: "Paste output of `openuma probe` here"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: "Command that failed"
      placeholder: "e.g. openuma configure --engine llamacpp --model ./model.gguf"
    validations:
      required: true

  - type: textarea
    id: error_output
    attributes:
      label: "Error output"
      placeholder: "Paste the full error message or panic output"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "OpenUMA version"
      placeholder: "e.g. v0.6.0 — run `openuma --version`"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: "OS"
      placeholder: "e.g. Ubuntu 24.04, Arch Linux, Fedora 40"
    validations:
      required: true
