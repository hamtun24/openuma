name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libvulkan-dev \
            libdrm-dev \
            pciutils \
            dmidecode

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release

      - name: Compress binary
        run: |
          cd target/release
          tar czf openuma-linux-x86_64.tar.gz openuma
          sha256sum openuma-linux-x86_64.tar.gz > openuma-linux-x86_64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/openuma-linux-x86_64.tar.gz
            target/release/openuma-linux-x86_64.tar.gz.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
