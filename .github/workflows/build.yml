name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
        rust: [stable]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libvulkan-dev \
            vulkan-tools \
            clinfo \
            libdrm-dev \
            pciutils \
            dmidecode

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install molten-vk

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build (debug)
        run: cargo build --all --target ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --all --target ${{ matrix.target }}

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: openuma-${{ matrix.os }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/openuma
          retention-days: 30

      - name: Upload release binary (Windows .exe)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: openuma-${{ matrix.os }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/openuma.exe
          retention-days: 30
